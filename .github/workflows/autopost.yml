name: video-autoposter

# Runs the auto-poster on GitHub's always-on infrastructure (no Mac needed).
# - schedule: every ~30 min GitHub checks the Dropbox /incoming folder.
#   (Private-repo free tier has limited run-minutes; 30 min keeps us well under.
#    GitHub's scheduler is also best-effort and can lag during peak load.)
# - workflow_dispatch: a manual "Run workflow" button (web or GitHub mobile app)
#   for INSTANT posting on demand — drop a video, tap Run, it posts.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# Least privilege: the job only needs to read the checked-out code.
permissions:
  contents: read

# Never let two runs overlap (prevents any chance of double-posting a video).
concurrency:
  group: autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto-poster (one pass)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: python main.py
